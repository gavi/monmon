name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # arm64 macOS runner — same platform monmon targets, and powermetrics
    # exists there so the stream tests exercise the real subprocess path.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy
      - name: Test
        run: uv run pytest -q
